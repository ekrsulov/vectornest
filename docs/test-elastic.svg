<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Test: Elastic Gizmo (40) — canHandle: easing starts with "elastic" -->
  <!-- Note: Elastic easing is VN-specific. Uses spline approximation for browser. -->
  <!-- In VectorNest, add easing="elastic(1, 0.5)" via the animation editor. -->
  <rect x="60" y="60" width="80" height="80" fill="#7C3AED" rx="8">
    <animateTransform attributeName="transform" type="scale" 
                      values="1;1.3;0.9;1.1;0.98;1" dur="2s" 
                      keyTimes="0;0.2;0.4;0.6;0.8;1"
                      repeatCount="indefinite" fill="freeze" />
  </rect>
</svg>
