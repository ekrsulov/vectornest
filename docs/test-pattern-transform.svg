<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Test: Pattern Transform Gizmo (17) — canHandle: attributeName="patternTransform" -->
  <defs>
    <pattern id="pat1" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#EC4899" />
      <rect x="10" y="10" width="10" height="10" fill="#EC4899" />
      <animate attributeName="patternTransform" from="rotate(0)" to="rotate(45)" dur="4s" repeatCount="indefinite" fill="freeze" />
    </pattern>
  </defs>
  <rect x="20" y="20" width="160" height="160" fill="url(#pat1)" rx="8" />
</svg>
