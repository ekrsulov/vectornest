<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <title>Parallax Gizmo Test</title>
  <desc>Layered elements with parallax depth effect.</desc>

  <rect width="400" height="300" fill="#1a202c" />
  <text x="200" y="25" text-anchor="middle" font-size="14" fill="#e2e8f0">Parallax Gizmo Test</text>

  <!-- Background layer (slow) -->
  <rect x="40" y="100" width="320" height="120" rx="8" fill="#2d3748" stroke="#4a5568" stroke-width="1">
    <animateTransform attributeName="transform" type="translate" values="0 0; 10 0; 0 0" dur="4s" repeatCount="indefinite" />
  </rect>

  <!-- Midground layer (medium) -->
  <rect x="80" y="110" width="240" height="100" rx="8" fill="#4a5568" stroke="#718096" stroke-width="1">
    <animateTransform attributeName="transform" type="translate" values="0 0; 25 0; 0 0" dur="4s" repeatCount="indefinite" />
  </rect>

  <!-- Foreground layer (fast) -->
  <rect x="130" y="120" width="140" height="80" rx="8" fill="#718096" stroke="#a0aec0" stroke-width="1">
    <animateTransform attributeName="transform" type="translate" values="0 0; 50 0; 0 0" dur="4s" repeatCount="indefinite" />
  </rect>

  <text x="200" y="270" text-anchor="middle" font-size="12" fill="#a0aec0">Layers move at different speeds</text>
</svg>
