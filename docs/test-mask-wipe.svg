<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Test: Mask Wipe Gizmo — canHandle: attributeName="mask-position" -->
  <!-- Note: mask-position is VN-specific. Width animation on mask rect provides visual. -->
  <defs>
    <mask id="wipe1">
      <rect x="0" y="0" width="200" height="200" fill="white">
        <animate attributeName="width" from="0" to="200" dur="2s" repeatCount="indefinite" fill="freeze" />
      </rect>
    </mask>
  </defs>
  <rect x="20" y="20" width="160" height="160" fill="#2563EB" rx="8" mask="url(#wipe1)">
    <animate attributeName="mask-position" from="0" to="1" dur="2s" repeatCount="indefinite" fill="freeze" />
  </rect>
</svg>
