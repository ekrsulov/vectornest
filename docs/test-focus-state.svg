<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Test: Focus State Gizmo (30) — canHandle: begin="focus" or "focusin" -->
  <rect x="40" y="40" width="120" height="120" fill="#7C3AED" rx="8" tabindex="0">
    <animate attributeName="stroke-width" from="0" to="4" dur="0.3s" begin="focus" fill="freeze" />
    <animate attributeName="stroke" from="#7C3AED" to="#A78BFA" dur="0.3s" begin="focus" fill="freeze" />
  </rect>
</svg>
