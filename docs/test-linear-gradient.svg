<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Test: Linear Gradient Gizmo (15) — canHandle: attributeName in [x1,x2,y1,y2] -->
  <defs>
    <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#EC4899" />
      <animate attributeName="x2" from="0%" to="100%" dur="3s" repeatCount="indefinite" fill="freeze" />
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="160" height="160" fill="url(#lg1)" rx="8" />
</svg>
