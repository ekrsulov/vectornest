<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Test: Text Reveal Gizmo (33) — canHandle: attributeName="text-reveal" -->
  <!-- Note: text-reveal is a VectorNest-specific attribute; the opacity animate provides visual in browser -->
  <text x="30" y="120" font-size="24" fill="#059669" font-family="Arial">
    Hello
    <animate attributeName="text-reveal" from="0" to="1" dur="3s" repeatCount="indefinite" fill="freeze" />
    <animate attributeName="opacity" from="0" to="1" dur="3s" repeatCount="indefinite" fill="freeze" />
  </text>
</svg>
