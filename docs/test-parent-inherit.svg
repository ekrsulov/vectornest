<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Test: Parent Inherit Gizmo (23) — canHandle: attributeName="inherit-transform" -->
  <!-- Note: inherit-transform is VN-specific. Opacity animation provides visual in browser. -->
  <rect x="50" y="50" width="100" height="100" fill="#059669" rx="8">
    <animate attributeName="inherit-transform" from="1" to="0.5" dur="2s" repeatCount="indefinite" fill="freeze" />
    <animate attributeName="opacity" from="1" to="0.5" dur="2s" repeatCount="indefinite" fill="freeze" />
  </rect>
</svg>
