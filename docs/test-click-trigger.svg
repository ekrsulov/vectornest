<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <title>Click Trigger Gizmo Test</title>
  <desc>A circle that pulses on click.</desc>

  <rect width="400" height="300" fill="#f0f4f8" />
  <text x="200" y="25" text-anchor="middle" font-size="14" fill="#4a5568">Click Trigger Gizmo Test</text>

  <circle cx="200" cy="145" r="50" fill="#e53e3e" stroke="#c53030" stroke-width="2" style="cursor: pointer;">
    <animate
      attributeName="r"
      from="50"
      to="70"
      dur="0.3s"
      begin="click"
      fill="freeze"
    />
  </circle>

  <text x="200" y="260" text-anchor="middle" font-size="12" fill="#718096">Click the circle to test</text>
</svg>
