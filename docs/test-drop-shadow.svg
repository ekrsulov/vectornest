<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Test: Drop Shadow Gizmo (19) — canHandle: attributeName in [dx, dy, flood-opacity] -->
  <defs>
    <filter id="ds1">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5">
        <animate attributeName="dx" from="0" to="10" dur="2s" repeatCount="indefinite" fill="freeze" />
      </feDropShadow>
    </filter>
  </defs>
  <rect x="40" y="40" width="120" height="120" fill="#F59E0B" rx="8" filter="url(#ds1)" />
</svg>
