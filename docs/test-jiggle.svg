<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <title>Jiggle Gizmo Test</title>
  <desc>A rectangle with jiggle/vibrate effect.</desc>

  <rect width="400" height="300" fill="#f0f4f8" />
  <text x="200" y="25" text-anchor="middle" font-size="14" fill="#4a5568">Jiggle Gizmo Test</text>

  <rect x="160" y="100" width="80" height="80" rx="8" fill="#805ad5" stroke="#6b46c1" stroke-width="2">
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0 0; 5 -3; -4 2; 3 -5; -2 4; 0 0"
      dur="0.3s"
      repeatCount="indefinite"
    />
  </rect>

  <text x="200" y="260" text-anchor="middle" font-size="12" fill="#718096">Rapid random positional jitter</text>
</svg>
