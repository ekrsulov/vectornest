<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Test: Color Matrix Gizmo (20) — canHandle: attributeName="values" + targetElementId includes "feColorMatrix" -->
  <defs>
    <filter id="cm1">
      <feColorMatrix id="feColorMatrix1" type="hueRotate" values="0">
        <animate attributeName="values" from="0" to="360" dur="4s" repeatCount="indefinite" fill="freeze" />
      </feColorMatrix>
    </filter>
  </defs>
  <rect x="20" y="20" width="160" height="160" fill="#EC4899" rx="8" filter="url(#cm1)" />
</svg>
