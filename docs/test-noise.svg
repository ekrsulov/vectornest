<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Test: Noise Gizmo (38) — canHandle: type="custom" attributeName="noise" -->
  <!-- Note: Noise is VN-specific custom type. Cannot be triggered from SVG import. -->
  <!-- Use VectorNest's animation editor to add noise animation to this element. -->
  <rect x="30" y="30" width="140" height="140" fill="#059669" rx="4">
    <animate attributeName="opacity" from="0.8" to="1" dur="0.5s" repeatCount="indefinite" fill="freeze" />
  </rect>
</svg>
