<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Test: Blur Gizmo (18) — canHandle: attributeName="stdDeviation" -->
  <defs>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="0">
        <animate attributeName="stdDeviation" from="0" to="10" dur="3s" repeatCount="indefinite" fill="freeze" />
      </feGaussianBlur>
    </filter>
  </defs>
  <rect x="30" y="30" width="140" height="140" fill="#3B82F6" rx="8" filter="url(#blur1)" />
</svg>
