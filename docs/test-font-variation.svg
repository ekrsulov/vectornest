<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Test: Font Variation Gizmo (34) — canHandle: attributeName="font-weight" or "font-variation-settings" -->
  <text x="40" y="120" font-size="36" fill="#2563EB" font-family="Arial" font-weight="400">
    Abc
    <animate attributeName="font-weight" from="100" to="900" dur="3s" repeatCount="indefinite" fill="freeze" />
  </text>
</svg>
