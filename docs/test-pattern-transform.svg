<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <title>Pattern Transform Gizmo Test</title>
  <desc>A rectangle with animated pattern transform (scale).</desc>

  <rect width="400" height="300" fill="#f0f4f8" />
  <text x="200" y="25" text-anchor="middle" font-size="14" fill="#4a5568">Pattern Transform Gizmo Test</text>

  <defs>
    <pattern id="pat" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="4" fill="#805ad5" />
      <animateTransform
        attributeName="patternTransform"
        type="rotate"
        from="0"
        to="360"
        dur="4s"
        repeatCount="indefinite"
      />
    </pattern>
  </defs>

  <rect x="100" y="50" width="200" height="180" fill="url(#pat)" stroke="#4a5568" stroke-width="2" rx="8" />
</svg>
