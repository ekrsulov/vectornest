<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Test: Color Gizmo (09b) — canHandle: attributeName="fill" or "stroke" -->
  <rect x="40" y="40" width="120" height="120" fill="#FF0000" rx="8">
    <animate attributeName="fill" from="#FF0000" to="#0000FF" dur="3s" repeatCount="indefinite" fill="freeze" />
  </rect>
</svg>
