<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Test: Clip Path Gizmo — canHandle: attributeName="clip-path" -->
  <defs>
    <clipPath id="cp1">
      <circle cx="100" cy="100" r="60">
        <animate attributeName="r" from="20" to="80" dur="2s" repeatCount="indefinite" fill="freeze" />
      </circle>
    </clipPath>
  </defs>
  <rect x="20" y="20" width="160" height="160" fill="#059669" rx="4" clip-path="url(#cp1)">
    <animate attributeName="clip-path" from="circle(20px)" to="circle(80px)" dur="2s" repeatCount="indefinite" fill="freeze" />
  </rect>
</svg>
