<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <title>Radial Gradient Gizmo Test</title>
  <desc>A circle with animated radial gradient radius.</desc>

  <rect width="400" height="300" fill="#f0f4f8" />
  <text x="200" y="25" text-anchor="middle" font-size="14" fill="#4a5568">Radial Gradient Gizmo Test</text>

  <defs>
    <radialGradient id="rad-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f6e05e" />
      <stop offset="100%" stop-color="#dd6b20" />
      <animate
        attributeName="r"
        from="20%"
        to="80%"
        dur="2s"
        repeatCount="indefinite"
        fill="freeze"
      />
    </radialGradient>
  </defs>

  <circle cx="200" cy="150" r="90" fill="url(#rad-grad)" stroke="#4a5568" stroke-width="2" />
</svg>
