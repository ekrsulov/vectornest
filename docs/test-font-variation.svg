<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <title>Font Variation Gizmo Test</title>
  <desc>Text with animated font-weight.</desc>

  <rect width="400" height="300" fill="#f0f4f8" />
  <text x="200" y="25" text-anchor="middle" font-size="14" fill="#4a5568">Font Variation Gizmo Test</text>

  <text x="200" y="160" text-anchor="middle" font-size="36" fill="#d69e2e" font-weight="100"
        font-family="sans-serif">
    Weight
    <animate
      attributeName="font-weight"
      values="100; 900"
      dur="2s"
      repeatCount="indefinite"
      fill="freeze"
    />
  </text>
</svg>
