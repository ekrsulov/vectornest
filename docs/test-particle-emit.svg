<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Test: Particle Emit Gizmo (36) — canHandle: type="custom" attributeName="particle-emit" -->
  <!-- Note: Particle emit is VN-specific custom type. Cannot be triggered from SVG import. -->
  <!-- Use VectorNest's animation editor to configure particle settings. -->
  <circle cx="100" cy="100" r="30" fill="#F59E0B">
    <animate attributeName="opacity" from="1" to="0.3" dur="1s" repeatCount="indefinite" fill="freeze" />
  </circle>
</svg>
