<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Test: Mask Reveal Gizmo — canHandle: attributeName="mask" or "mask-opacity" -->
  <defs>
    <mask id="reveal1">
      <rect x="0" y="0" width="200" height="200" fill="white">
        <animate attributeName="opacity" from="0" to="1" dur="2s" repeatCount="indefinite" fill="freeze" />
      </rect>
    </mask>
  </defs>
  <rect x="20" y="20" width="160" height="160" fill="#7C3AED" rx="8" mask="url(#reveal1)">
    <animate attributeName="mask-opacity" from="0" to="1" dur="2s" repeatCount="indefinite" fill="freeze" />
  </rect>
</svg>
