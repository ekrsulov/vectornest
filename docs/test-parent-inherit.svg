<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <title>Parent Inherit Gizmo Test</title>
  <desc>Nested elements with animated inherit-transform factor.</desc>

  <rect width="400" height="300" fill="#f0f4f8" />
  <text x="200" y="25" text-anchor="middle" font-size="14" fill="#4a5568">Parent Inherit Gizmo Test</text>

  <g transform="translate(200,150)">
    <rect x="-80" y="-60" width="160" height="120" fill="none" stroke="#a0aec0" stroke-width="1" stroke-dasharray="4 4" />
    <rect x="-40" y="-30" width="80" height="60" rx="6" fill="#805ad5" stroke="#6b46c1" stroke-width="2">
      <animate
        attributeName="inherit-transform"
        from="0"
        to="1"
        dur="2s"
        repeatCount="indefinite"
        fill="freeze"
      />
    </rect>
  </g>
</svg>
