<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <title>Camera Pan Gizmo Test</title>
  <desc>A viewport panning across a scene.</desc>

  <rect width="400" height="300" fill="#f0f4f8" />
  <text x="200" y="25" text-anchor="middle" font-size="14" fill="#4a5568">Camera Pan Gizmo Test</text>

  <!-- Scene content (larger than viewport) -->
  <g>
    <rect x="50" y="60" width="80" height="80" rx="8" fill="#3182ce" />
    <rect x="160" y="100" width="80" height="80" rx="8" fill="#38a169" />
    <rect x="270" y="60" width="80" height="80" rx="8" fill="#e53e3e" />
    <rect x="100" y="180" width="80" height="80" rx="8" fill="#d69e2e" />
    <rect x="220" y="180" width="80" height="80" rx="8" fill="#805ad5" />

    <animateTransform
      attributeName="transform"
      type="translate"
      from="0 0"
      to="-100 -50"
      dur="3s"
      repeatCount="indefinite"
      fill="freeze"
    />
  </g>

  <!-- Camera frame indicator -->
  <rect x="5" y="5" width="390" height="290" fill="none" stroke="#718096" stroke-width="2" stroke-dasharray="8 4" rx="4" />
</svg>
