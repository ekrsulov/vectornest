<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <title>Skew Gizmo Test — 2 keyframes (values)</title>
  <desc>A rectangle with skewX animation from 0° to 30° using the values attribute.</desc>

  <rect width="400" height="300" fill="#f0f4f8" />
  <text x="200" y="25" text-anchor="middle" font-size="14" fill="#4a5568">Skew Gizmo Test (2 keyframes — skewX)</text>

  <rect x="140" y="100" width="120" height="80" rx="4" fill="#805ad5" stroke="#6b46c1" stroke-width="2">
    <animateTransform
      attributeName="transform"
      type="skewX"
      values="0; 30"
      dur="2s"
      repeatCount="indefinite"
      fill="freeze"
    />
  </rect>
</svg>
