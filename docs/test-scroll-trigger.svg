<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Test: Scroll Trigger Gizmo (29) — canHandle: begin includes "scroll" -->
  <rect x="40" y="40" width="120" height="120" fill="#2563EB" rx="8">
    <animate attributeName="opacity" from="0.2" to="1" dur="2s" begin="scroll(0, 1)" fill="freeze" />
  </rect>
</svg>
