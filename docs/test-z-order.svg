<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <title>Z-Order Gizmo Test</title>
  <desc>Overlapping rectangles with animated z-index.</desc>

  <rect width="400" height="300" fill="#f0f4f8" />
  <text x="200" y="25" text-anchor="middle" font-size="14" fill="#4a5568">Z-Order Gizmo Test</text>

  <rect x="130" y="80" width="100" height="100" fill="#e53e3e" stroke="#c53030" stroke-width="2" />
  <rect x="170" y="100" width="100" height="100" fill="#3182ce" stroke="#2b6cb0" stroke-width="2">
    <animate
      attributeName="z-index"
      from="0"
      to="10"
      dur="2s"
      repeatCount="indefinite"
      fill="freeze"
    />
  </rect>
</svg>
