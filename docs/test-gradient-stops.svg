<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <title>Gradient Stops Gizmo Test</title>
  <desc>A rectangle with animated gradient stop offsets.</desc>

  <rect width="400" height="300" fill="#f0f4f8" />
  <text x="200" y="25" text-anchor="middle" font-size="14" fill="#4a5568">Gradient Stops Gizmo Test</text>

  <defs>
    <linearGradient id="stop-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e53e3e">
        <animate attributeName="offset" from="0" to="0.4" dur="2s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#3182ce">
        <animate attributeName="offset" from="1" to="0.6" dur="2s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>

  <rect x="80" y="70" width="240" height="140" rx="12" fill="url(#stop-grad)" stroke="#4a5568" stroke-width="2" />
</svg>
