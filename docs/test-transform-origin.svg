<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Test: Transform Origin Gizmo (21) — canHandle: attributeName="transform-origin" -->
  <rect x="50" y="50" width="100" height="100" fill="#E91E63" rx="8">
    <animate attributeName="transform-origin" from="100px 100px" to="50px 50px" dur="2s" repeatCount="indefinite" fill="freeze" />
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite" />
  </rect>
</svg>
