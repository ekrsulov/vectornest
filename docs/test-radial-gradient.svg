<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Test: Radial Gradient Gizmo (16) — canHandle: attributeName in [cx,cy,r,fr] -->
  <defs>
    <radialGradient id="rg1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F472B6" />
      <stop offset="100%" stop-color="#7C3AED" />
      <animate attributeName="r" from="20%" to="80%" dur="3s" repeatCount="indefinite" fill="freeze" />
    </radialGradient>
  </defs>
  <rect x="20" y="20" width="160" height="160" fill="url(#rg1)" rx="8" />
</svg>
