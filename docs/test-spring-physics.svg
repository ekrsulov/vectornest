<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Test: Spring Physics Gizmo (35) — canHandle: easing starts with "spring" -->
  <!-- Note: Spring easing is VN-specific. Animation uses spline approximation for browser preview. -->
  <!-- In VectorNest, add easing="spring(100,10,1)" via the animation editor. -->
  <circle cx="100" cy="100" r="30" fill="#DB2777">
    <animate attributeName="cy" from="40" to="160" dur="1s" repeatCount="indefinite" fill="freeze"
             calcMode="spline" keyTimes="0;1" keySplines="0.5 0 0.5 1" />
  </circle>
</svg>
