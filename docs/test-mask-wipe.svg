<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <title>Mask Wipe Gizmo Test</title>
  <desc>A rectangle with animated mask position for a wipe effect.</desc>

  <rect width="400" height="300" fill="#f0f4f8" />
  <text x="200" y="25" text-anchor="middle" font-size="14" fill="#4a5568">Mask Wipe Gizmo Test</text>

  <defs>
    <linearGradient id="wipe-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" />
      <stop offset="50%" stop-color="white" />
      <stop offset="60%" stop-color="black" />
      <stop offset="100%" stop-color="black" />
    </linearGradient>
    <mask id="mask-wipe">
      <rect x="0" y="0" width="400" height="300" fill="url(#wipe-grad)">
        <animate
          attributeName="x"
          from="-400"
          to="0"
          dur="2s"
          repeatCount="indefinite"
          fill="freeze"
        />
      </rect>
    </mask>
  </defs>

  <rect x="120" y="60" width="160" height="160" fill="#d69e2e" stroke="#b7791f" stroke-width="2"
        mask="url(#mask-wipe)" />
</svg>
