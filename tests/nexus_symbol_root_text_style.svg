<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" style="background:#02050e; font-family:'Courier New', monospace; overflow:hidden;">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#190a2a" />
      <stop offset="100%" stop-color="#020005" />
    </radialGradient>

    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0055">
        <animate attributeName="stop-color" values="#ff0055;#00f0ff;#7a00ff;#ff0055" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#00f0ff">
        <animate attributeName="stop-color" values="#00f0ff;#7a00ff;#ff0055;#00f0ff" dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a3b5c" stroke-width="0.5" stroke-opacity="0.4"/>
      <circle cx="0" cy="0" r="1.5" fill="#00f0ff">
        <animate attributeName="r" values="1;3;1" dur="2s" repeatCount="indefinite" />
      </circle>
    </pattern>

    <radialGradient id="maskGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#000000" />
      <animate attributeName="r" values="5%;60%;5%" dur="12s" repeatCount="indefinite" />
    </radialGradient>
    <mask id="gridMask">
      <rect width="100%" height="100%" fill="url(#maskGrad)" />
    </mask>

    <clipPath id="hexagonClip">
      <polygon points="500,100 846,300 846,700 500,900 154,700 154,300">
        <animateTransform attributeName="transform" type="rotate" values="0 500 500; 360 500 500" dur="40s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="scale" values="0.8; 1.1; 0.8" dur="8s" repeatCount="indefinite" additive="sum" />
      </polygon>
    </clipPath>

    <filter id="hyperGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur2" />
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" result="noise">
        <animate attributeName="baseFrequency" values="0.01;0.05;0.01" dur="15s" repeatCount="indefinite" />
      </feTurbulence>
      <feDisplacementMap in="blur2" in2="noise" scale="25" xChannelSelector="R" yChannelSelector="G" result="distorted" />
      <feMerge>
        <feMergeNode in="distorted" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <symbol id="nexus">
      <circle cx="500" cy="500" r="220" fill="none" stroke="url(#neon)" stroke-width="4" stroke-dasharray="10 40 80 20" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" values="0 500 500; 360 500 500" dur="15s" repeatCount="indefinite" />
      </circle>
      <path d="M 500 320 Q 550 450 680 500 Q 550 550 500 680 Q 450 550 320 500 Q 450 450 500 320 Z" fill="none" stroke="url(#neon)" stroke-width="2">
        <animateTransform attributeName="transform" type="rotate" values="360 500 500; 0 500 500" dur="10s" repeatCount="indefinite" />
      </path>
      <circle cx="500" cy="500" r="40" fill="url(#neon)">
        <animate attributeName="r" values="30;60;30" dur="2.5s" repeatCount="indefinite" />
      </circle>
    </symbol>

    <path id="orbitalPath" d="M 200 500 A 300 300 0 1 1 800 500 A 300 300 0 1 1 200 500" fill="none" />
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGlow)" />
  <rect width="100%" height="100%" fill="url(#grid)" mask="url(#gridMask)" />

  <g clip-path="url(#hexagonClip)" filter="url(#hyperGlow)">
    <use href="#nexus">
      <animateTransform attributeName="transform" type="scale" values="1; 1.5; 1" dur="6s" repeatCount="indefinite" transform-origin="500 500" />
    </use>
    <use href="#nexus" opacity="0.3">
      <animateTransform attributeName="transform" type="scale" values="2.5; 0.5; 2.5" dur="12s" repeatCount="indefinite" transform-origin="500 500" />
      <animateTransform attributeName="transform" type="rotate" values="0 500 500; 360 500 500" dur="20s" repeatCount="indefinite" additive="sum"/>
    </use>
    <use href="#nexus" opacity="0.6">
      <animateTransform attributeName="transform" type="scale" values="0.4; 0.7; 0.4" dur="4s" repeatCount="indefinite" transform-origin="500 500" />
      <animateTransform attributeName="transform" type="rotate" values="360 500 500; 0 500 500" dur="8s" repeatCount="indefinite" additive="sum"/>
    </use>
  </g>

  <text font-size="22" font-weight="900" fill="#ffffff" letter-spacing="12" filter="url(#hyperGlow)" opacity="0.9">
    <textPath href="#orbitalPath" startOffset="0%">
      ** QUANTUM SINGULARITY DETECTED // OVERRIDE CORE PROTOCOLS **
      <animate attributeName="startOffset" values="0%;100%" dur="15s" repeatCount="indefinite" />
    </textPath>
  </text>

  <circle r="12" fill="#ffffff" filter="url(#hyperGlow)">
    <animateMotion dur="15s" repeatCount="indefinite">
      <mpath href="#orbitalPath"/>
    </animateMotion>
  </circle>
</svg>
