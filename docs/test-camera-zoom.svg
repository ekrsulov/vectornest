<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Test: Camera Zoom Gizmo (46) — canHandle: type="custom" attributeName="camera-zoom" -->
  <!-- Note: Camera zoom is VN-specific custom type. SVG uses scale transform for browser preview. -->
  <g transform="translate(100,100)">
    <rect x="-40" y="-40" width="80" height="80" fill="#2563EB" rx="4">
      <animateTransform attributeName="transform" type="scale" from="1" to="2" dur="3s" repeatCount="indefinite" fill="freeze" additive="sum" />
    </rect>
  </g>
</svg>
