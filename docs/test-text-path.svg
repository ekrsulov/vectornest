<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Test: Text Path Gizmo (31) — canHandle: attributeName="startOffset" -->
  <defs>
    <path id="textArc" d="M 20 150 Q 100 20 180 150" fill="none" />
  </defs>
  <text font-size="16" fill="#EC4899" font-family="Arial">
    <textPath href="#textArc">
      Text on Path
      <animate attributeName="startOffset" from="0%" to="80%" dur="4s" repeatCount="indefinite" fill="freeze" />
    </textPath>
  </text>
</svg>
