<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Test: Gradient Stops Gizmo — canHandle: attributeName="offset" -->
  <defs>
    <linearGradient id="gs1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B">
        <animate attributeName="offset" from="0" to="0.5" dur="3s" repeatCount="indefinite" fill="freeze" />
      </stop>
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="160" height="160" fill="url(#gs1)" rx="8" />
</svg>
