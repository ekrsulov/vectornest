<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <title>Group Transform Gizmo Test</title>
  <desc>A group of elements with animated rotation and scale.</desc>

  <rect width="400" height="300" fill="#f0f4f8" />
  <text x="200" y="25" text-anchor="middle" font-size="14" fill="#4a5568">Group Transform Gizmo Test</text>

  <g id="group-test">
    <rect x="150" y="90" width="50" height="50" rx="6" fill="#3182ce" />
    <rect x="210" y="90" width="50" height="50" rx="6" fill="#38a169" />
    <rect x="150" y="150" width="50" height="50" rx="6" fill="#d69e2e" />
    <rect x="210" y="150" width="50" height="50" rx="6" fill="#e53e3e" />
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 205 140"
      to="90 205 140"
      dur="3s"
      repeatCount="indefinite"
      fill="freeze"
    />
  </g>
</svg>
