<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Test: Anchor Point Gizmo (26) — canHandle: attributeName="anchor-point" -->
  <!-- Note: anchor-point is VN-specific. Scale animation provides visual in browser. -->
  <rect x="50" y="50" width="100" height="100" fill="#DC2626" rx="8">
    <animate attributeName="anchor-point" from="100 100" to="50 50" dur="2s" repeatCount="indefinite" fill="freeze" />
    <animateTransform attributeName="transform" type="scale" from="1" to="1.2" dur="2s" repeatCount="indefinite" fill="freeze" />
  </rect>
</svg>
